  <div class="main">
    <div class="api-bar" role="status">
      <div class="api-dot" id="apiDot"></div>
      <span>API:</span>
      <input type="url" id="apiUrl" value="http://localhost:8000" aria-label="URL da API" spellcheck="false"/>
      <span id="apiStatus">verificando...</span>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <header class="topbar" role="banner">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="PageSidebar.toggle()" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">Talhões</h1>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="location.reload()" title="Atualizar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Atualizar</button>

    <main class="content" role="main">
      <div class="card">
        <div class="card-header"><span class="card-title">Talhões</span></div>
        <div class="card-body"><div id="tableBody" class="loading">Carregando…</div></div>

</div>

  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Registro</span>
        <button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="saveBtn" onclick="submitForm()">Salvar</button>
      </div>
    </div>

  <div class="toast" id="toast" role="alert"></div>


  <script>
    // Shared page bootstrap
    (function() {
      const user = sessionStorage.getItem('agropulse_user') || 'Admin';
      const nm = document.getElementById('userName');
      const av = document.getElementById('userAvatar');
      if (nm) nm.textContent = user;
      if (av) av.textContent = user.charAt(0).toUpperCase();
    })();

    function promptUserName() {
      const cur = sessionStorage.getItem('agropulse_user') || 'Admin';
      const name = prompt('Qual o seu nome?', cur);
      if (name && name.trim()) {
        const t = name.trim();
        sessionStorage.setItem('agropulse_user', t);
        const nm = document.getElementById('userName');
        const av = document.getElementById('userAvatar');
        if (nm) nm.textContent = t;
        if (av) av.textContent = t.charAt(0).toUpperCase();
      }
    }

    const PageSidebar = {
      toggle() {
        document.querySelector('.sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
      },
      close() {
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
      }
    };

    document.getElementById('sidebarOverlay').addEventListener('click', () => PageSidebar.close());

    const PageApi = {
      base: 'http://localhost:8000',
      async get(path) {
        const r = await fetch(this.base + path, { headers: {'Content-Type':'application/json'} });
        if (!r.ok) throw new Error(await r.text());
        return r.json();
      },
      async post(path, body) {
        const r = await fetch(this.base + path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (!r.ok) throw new Error(await r.text());
        if (r.status === 204) return null;
        return r.json();
      },
      async del(path) {
        const r = await fetch(this.base + path, { method:'DELETE', headers:{'Content-Type':'application/json'} });
        if (!r.ok) throw new Error(await r.text());
        return null;
      },
      async test() {
        const dot = document.getElementById('apiDot');
        const status = document.getElementById('apiStatus');
        try {
          await fetch(this.base + '/');
          if (dot) dot.className = 'api-dot on';
          if (status) status.textContent = 'conectado';
        } catch {
          if (dot) dot.className = 'api-dot';
          if (status) status.textContent = 'sem conexão';
        }
      }
    };

    const urlInput = document.getElementById('apiUrl');
    if (urlInput) {
      urlInput.addEventListener('change', () => { PageApi.base = urlInput.value.replace(/\/+$/, ''); });
      urlInput.addEventListener('blur', () => PageApi.test());
    }

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      if (!el) return;
      el.textContent = msg;
      el.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => el.className = 'toast', 3200);
    }

    function badge(val) {
      if (!val) return '—';
      const map = {
        planejada:'badge-yellow', em_andamento:'badge-blue', colhida:'badge-green', cancelada:'badge-gray',
        disponivel:'badge-green', em_uso:'badge-blue', manutencao:'badge-yellow', inativo:'badge-gray',
        PJ:'badge-blue', PF:'badge-green',
        defensivo:'badge-yellow', fertilizante:'badge-green', semente:'badge-blue', combustivel:'badge-gray', outro:'badge-gray'
      };
      return '<span class="badge ' + (map[val]||'badge-gray') + '">' + val.replace(/_/g,' ') + '</span>';
    }

    function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    PageApi.test();
  </script>
  <script>

    function openModal(title, formHtml, onSubmit) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = formHtml;
      document.getElementById('modalOverlay').classList.add('open');
      window._modalOnSubmit = onSubmit;
      setTimeout(() => { const f = document.querySelector('#modalBody input,#modalBody select'); if(f) f.focus(); }, 50);
      document.getElementById('modalOverlay').onclick = e => { if(e.target.id==='modalOverlay') closeModal(); };
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    async function submitForm() {
      if (window._modalOnSubmit) {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.textContent = 'Salvando…';
        try { await window._modalOnSubmit(); closeModal(); }
        catch(e) { showToast('Erro: '+e.message, true); }
        finally { btn.disabled = false; btn.textContent = 'Salvar'; }
      }
    }

    async function loadData() {
      const el = document.getElementById('tableBody');
      el.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        const data = await PageApi.get('/api/v1/talhoes');
        if (!data.length) { el.innerHTML = '<div class="empty"><span class="empty-icon">📭</span><span class="empty-text">Nenhum talhão cadastrado.</span></div>'; return; }
        el.innerHTML = '<div class="table-wrap"><table><thead><tr><th>ID</th><th>Nome</th><th>Fazenda</th><th>Área (ha)</th><th>Solo</th><th>Irrigação</th><th>Ações</th></tr></thead><tbody>'
          + data.map(r => `<tr><td>${r.id}</td><td>${r.nome}</td><td>${r.fazenda_id}</td><td>${r.area_ha||'—'}</td><td>${r.tipo_solo||'—'}</td><td>${r.irrigacao||'—'}</td><td><button class="btn btn-danger btn-sm" onclick="deleteRecord('/api/v1/talhoes',${r.id})">Excluir</button></td></tr>`).join('')
          + '</tbody></table></div>';
      } catch(e) { el.innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span><span class="empty-text">'+e.message+'</span></div>'; }
    }
    async function deleteRecord(ep, id) {
      if (!confirm('Excluir talhão #'+id+'?')) return;
      try { await PageApi.del(ep+'/'+id); showToast('✅ Excluído!'); loadData(); } catch(e) { showToast(e.message,true); }
    }
    document.getElementById('btnNovo').onclick = () => openModal('Novo Talhão', `
      <div class="form-grid">
        <div class="form-group"><label>Fazenda ID</label><input id="f_fazenda_id" type="number" placeholder="1"/></div>
        <div class="form-group"><label>Nome</label><input id="f_nome" placeholder="Talhão A1"/></div>
        <div class="form-group"><label>Área (ha)</label><input id="f_area_ha" type="number" step="0.01" placeholder="50"/></div>
        <div class="form-group"><label>Tipo de Solo</label><input id="f_tipo_solo" placeholder="Latossolo"/></div>
        <div class="form-group"><label>Irrigação</label><input id="f_irrigacao" placeholder="Pivô Central"/></div>
      </div>`, async () => {
        await PageApi.post('/api/v1/talhoes',{fazenda_id:parseInt(v('f_fazenda_id')),nome:v('f_nome'),area_ha:parseFloat(v('f_area_ha'))||null,tipo_solo:v('f_tipo_solo')||null,irrigacao:v('f_irrigacao')||null});
        showToast('✅ Talhão salvo!'); loadData();
      });
    loadData();
  </script>
</body>
