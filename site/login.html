<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroPulse — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>
  <main class="container">

    <div class="left">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22V12M12 12C12 7 7 4 2 4c0 5 3 8 10 8zM12 12c0-5 5-8 10-8-1 5-4 8-10 8"/>
          </svg>
        </div>
        <span class="brand-name">AgroPulse</span>
      </div>

      <div class="left-footer">
        <h2>Construindo o futuro do agronegócio</h2>
        <p>Tecnologia inteligente para uma gestão agrícola mais eficiente, conectada e sustentável.</p>
      </div>
    </div>

    <div class="right">
      <div class="login-form">
        <h1>Bem-vindo!</h1>
        <p class="subtitle">Acesse sua conta para continuar</p>

        <div class="error-msg" id="errorMsg">Usuário ou senha inválidos.</div>

        <div class="form-group">
          <label for="userInput">Usuário</label>
          <input type="text" id="userInput" placeholder="Seu usuário" autocomplete="username"/>
        </div>

        <div class="form-group">
          <label for="passwordInput">Senha</label>
          <input type="password" id="passwordInput" placeholder="Sua senha" autocomplete="current-password"/>
        </div>

        <a href="#" class="forgot-link">Esqueci minha senha</a>

        <button type="button" class="btn-login" id="loginBtn" onclick="handleLogin()">Entrar</button>

        <div class="divider">ou</div>

        <button type="button" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continuar com Google
        </button>

        <p class="signup-text">Não tem conta? <a href="#">Cadastre-se</a></p>
      </div>
    </div>

  </main>

  <script>
    function handleLogin() {
      const user = document.getElementById('userInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      const err  = document.getElementById('errorMsg');
      const btn  = document.getElementById('loginBtn');

      err.classList.remove('show');

      if (!user || !pass) {
        err.textContent = 'Preencha usuário e senha.';
        err.classList.add('show');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Entrando…';


      localStorage.setItem('agropulse_user', JSON.stringify({
        name: user,
        role: 'Administrador'
      }));
      localStorage.setItem('agropulse_logged', '1');

      setTimeout(() => { window.location.href = 'painel.html'; }, 400);
    }


    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });


    if (localStorage.getItem('agropulse_logged') === '1') {
      window.location.href = 'painel.html';
    }
  </script>
</body>
</html>
