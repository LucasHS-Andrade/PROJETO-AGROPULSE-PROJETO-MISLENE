<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroPulse — Fazendas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/agropulse.css"/>
</head>
<body>
  <div id="app">

    <div class="card">
      <div class="card-header"><span class="card-title">Fazendas</span></div>
      <div class="card-body"><div id="table-fazendas">Carregando...</div></div>
    </div>

  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Registro</span>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitForm()">Salvar</button>
      </div>
    </div>
  </div>
  <script src="js/sidebar.js"></script>
  <script src="js/shared.js"></script>
  <script>

    const MODULE = {
      endpoint: '/api/v1/fazendas',
      cols: ["ID","Nome","Município","Estado","Área (ha)","CNPJ"],
      fields: r => [r.id, r.nome, r.municipio, r.estado, r.area_ha, r.cnpj||'—']
    };
    const PAYLOAD = () => ({ nome: v('f_nome'), municipio: v('f_municipio'), estado: v('f_estado'), area_ha: parseFloat(v('f_area_ha')), cnpj: v('f_cnpj')||null, cpf: v('f_cpf')||null });

    function reloadPage() { loadTable(MODULE, 'table-fazendas'); }

    function openModal() {
      document.getElementById('modalTitle').textContent = 'Novo — Fazendas';
      document.getElementById('modalBody').innerHTML = `
        <div class="form-grid">
          <div class="form-group"><label>Nome</label><input id="f_nome" placeholder="Fazenda Boa Vista"/></div>
          <div class="form-group"><label>Município</label><input id="f_municipio" placeholder="Patos de Minas"/></div>
          <div class="form-group"><label>Estado</label><input id="f_estado" maxlength="2" placeholder="MG"/></div>
          <div class="form-group"><label>Área (ha)</label><input id="f_area_ha" type="number" step="0.01" placeholder="450.5"/></div>
          <div class="form-group"><label>CNPJ</label><input id="f_cnpj" placeholder="00.000.000/0001-00"/></div>
          <div class="form-group"><label>CPF (pessoa física)</label><input id="f_cpf" placeholder="000.000.000-00"/></div>
        </div>`;
      document.getElementById('modalOverlay').classList.add('open');
    }

    async function submitForm() {
      try {
        await apiFetch(MODULE.endpoint, { method: 'POST', body: JSON.stringify(PAYLOAD()) });
        toast('Salvo com sucesso!');
        closeModal();
        reloadPage();
      } catch(e) { toast('Erro: ' + e.message, true); }
    }

    function pageInit() { reloadPage(); }
    

    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('agropulse_logged')) {
        window.location.href = 'login.html';
        return;
      }
      renderLayout('fazendas', 'Fazendas', true);
      pageInit();
    });
  </script>
</body>
</html>
