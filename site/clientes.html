<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroPulse — Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/agropulse.css"/>
</head>
<body>
  <div id="app">

    <div class="card">
      <div class="card-header"><span class="card-title">Clientes</span></div>
      <div class="card-body"><div id="table-clientes">Carregando...</div></div>
    </div>

  </div>
  <!-- MODAL (outside app, won't be moved by renderLayout) -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Registro</span>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitForm()">Salvar</button>
      </div>
    </div>
  </div>
  <script src="js/sidebar.js"></script>
  <script src="js/shared.js"></script>
  <script>

    const MODULE = {
      endpoint: '/api/v1/clientes',
      cols: ["ID","Razão Social","CNPJ/CPF","Tipo","Cidade","Estado","Limite Crédito"],
      fields: r => [r.id, r.razao_social, r.cnpj_cpf, badge(r.tipo), r.municipio||'—', r.estado||'—', r.limite_credito ? 'R$ '+parseFloat(r.limite_credito).toLocaleString('pt-BR') : '—']
    };
    const PAYLOAD = () => ({ razao_social: v('f_razao_social'), cnpj_cpf: v('f_cnpj_cpf'), tipo: v('f_tipo'), municipio: v('f_municipio')||null, estado: v('f_estado')||null, limite_credito: parseFloat(v('f_limite_credito'))||null });

    function reloadPage() { loadTable(MODULE, 'table-clientes'); }

    function openModal() {
      document.getElementById('modalTitle').textContent = 'Novo — Clientes';
      document.getElementById('modalBody').innerHTML = `
        <div class="form-grid">
          <div class="form-group"><label>Razão Social</label><input id="f_razao_social" placeholder="Empresa XYZ Ltda"/></div>
          <div class="form-group"><label>CNPJ/CPF</label><input id="f_cnpj_cpf" placeholder="00.000.000/0001-00"/></div>
          <div class="form-group"><label>Tipo</label><select id="f_tipo"><option value="PJ">Pessoa Jurídica</option><option value="PF">Pessoa Física</option></select></div>
          <div class="form-group"><label>Município</label><input id="f_municipio" placeholder="Uberlândia"/></div>
          <div class="form-group"><label>Estado</label><input id="f_estado" maxlength="2" placeholder="MG"/></div>
          <div class="form-group"><label>Limite de Crédito (R$)</label><input id="f_limite_credito" type="number" step="0.01" placeholder="50000"/></div>
        </div>`;
      document.getElementById('modalOverlay').classList.add('open');
    }

    async function submitForm() {
      try {
        await apiFetch(MODULE.endpoint, { method: 'POST', body: JSON.stringify(PAYLOAD()) });
        toast('Salvo com sucesso!');
        closeModal();
        reloadPage();
      } catch(e) { toast('Erro: ' + e.message, true); }
    }

    function pageInit() { reloadPage(); }
    

    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('agropulse_logged')) {
        window.location.href = 'login.html';
        return;
      }
      renderLayout('clientes', 'Clientes', true);
      pageInit();
    });
  </script>
</body>
</html>
