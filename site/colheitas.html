<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroPulse — Colheitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/agropulse.css"/>
</head>
<body>
  <div id="app">

    <div class="card">
      <div class="card-header"><span class="card-title">Colheitas</span></div>
      <div class="card-body"><div id="table-colheitas">Carregando...</div></div>
    </div>

  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Registro</span>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitForm()">Salvar</button>
      </div>
    </div>
  </div>
  <script src="js/sidebar.js"></script>
  <script src="js/shared.js"></script>
  <script>

    const MODULE = {
      endpoint: '/api/v1/colheitas',
      cols: ["ID","Safra ID","Data","Qtd (kg)","Umidade %","Impureza %","Destino"],
      fields: r => [r.id, r.safra_id, r.data, r.quantidade_kg, r.umidade_pct||'—', r.impureza_pct||'—', r.destino||'—']
    };
    const PAYLOAD = () => ({ safra_id: parseInt(v('f_safra_id')), data: v('f_data'), quantidade_kg: parseFloat(v('f_quantidade_kg')), umidade_pct: v('f_umidade_pct')||null, impureza_pct: v('f_impureza_pct')||null, destino: v('f_destino')||null });

    function reloadPage() { loadTable(MODULE, 'table-colheitas'); }

    function openModal() {
      document.getElementById('modalTitle').textContent = 'Novo — Colheitas';
      document.getElementById('modalBody').innerHTML = `
        <div class="form-grid">
          <div class="form-group"><label>Safra ID</label><input id="f_safra_id" type="number" placeholder="1"/></div>
          <div class="form-group"><label>Data</label><input id="f_data" type="date"/></div>
          <div class="form-group"><label>Quantidade (kg)</label><input id="f_quantidade_kg" type="number" step="0.001" placeholder="15000"/></div>
          <div class="form-group"><label>Umidade (%)</label><input id="f_umidade_pct" type="number" step="0.01" placeholder="13.5"/></div>
          <div class="form-group"><label>Impureza (%)</label><input id="f_impureza_pct" type="number" step="0.01" placeholder="1.2"/></div>
          <div class="form-group"><label>Destino</label><input id="f_destino" placeholder="Cooperativa XYZ"/></div>
        </div>`;
      document.getElementById('modalOverlay').classList.add('open');
    }

    async function submitForm() {
      try {
        await apiFetch(MODULE.endpoint, { method: 'POST', body: JSON.stringify(PAYLOAD()) });
        toast('Salvo com sucesso!');
        closeModal();
        reloadPage();
      } catch(e) { toast('Erro: ' + e.message, true); }
    }

    function pageInit() { reloadPage(); }
    

    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('agropulse_logged')) {
        window.location.href = 'login.html';
        return;
      }
      renderLayout('colheitas', 'Colheitas', true);
      pageInit();
    });
  </script>
</body>
</html>
