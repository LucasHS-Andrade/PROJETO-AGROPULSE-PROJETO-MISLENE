<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroPulse — Painel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/agropulse.css"/>
</head>
<body>
  <div id="app">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div class="stat-label">Fazendas</div>
        <div class="stat-value" id="stat-fazendas">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V7"/><path d="M5 12C5 8 8 5 12 5c0 4-3 7-7 7z"/><path d="M19 12C19 8 16 5 12 5c0 4 3 7 7 7z"/><path d="M5 18C5 14 8 11 12 11c0 4-3 7-7 7z"/><path d="M19 18C19 14 16 11 12 11c0 4 3 7 7 7z"/></svg></div>
        <div class="stat-label">Safras Ativas</div>
        <div class="stat-value" id="stat-safras">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="stat-label">Funcionários</div>
        <div class="stat-value" id="stat-funcionarios">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>
        <div class="stat-label">Clientes</div>
        <div class="stat-value" id="stat-clientes">—</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Bem-vindo ao AgroPulse</span></div>
      <div class="card-body" style="padding:24px; color:var(--c-text-muted); font-size:14px; line-height:1.7">
        Selecione um módulo no menu lateral para começar a gerenciar sua operação agrícola.<br/>
        Configure a URL da API na barra superior caso necessário.
      </div>
    </div>

  </div>
  <!-- MODAL (outside app, won't be moved by renderLayout) -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Registro</span>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitForm()">Salvar</button>
      </div>
    </div>
  </div>
  <script src="js/sidebar.js"></script>
  <script src="js/shared.js"></script>
  <script>

    function reloadPage() { loadStats(); }
    function openModal() {}
    function submitForm() {}
    async function loadStats() {
      const map = { fazendas:'stat-fazendas', safras:'stat-safras', funcionarios:'stat-funcionarios', clientes:'stat-clientes' };
      for (const [ep, elId] of Object.entries(map)) {
        try {
          const data = await apiFetch('/api/v1/' + ep);
          document.getElementById(elId).textContent = data.length;
        } catch { document.getElementById(elId).textContent = '—'; }
      }
    }
    function pageInit() { loadStats(); }
    

    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('agropulse_logged')) {
        window.location.href = 'login.html';
        return;
      }
      renderLayout('painel', 'Painel', false);
      pageInit();
    });
  </script>
</body>
</html>
