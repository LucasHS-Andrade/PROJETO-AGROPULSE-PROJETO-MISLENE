<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroPulse — Funcionários</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/agropulse.css"/>
</head>
<body>
  <div id="app">

    <div class="card">
      <div class="card-header"><span class="card-title">Funcionários</span></div>
      <div class="card-body"><div id="table-funcionarios">Carregando...</div></div>
    </div>

  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Registro</span>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitForm()">Salvar</button>
      </div>
    </div>
  </div>
  <script src="js/sidebar.js"></script>
  <script src="js/shared.js"></script>
  <script>

    const MODULE = {
      endpoint: '/api/v1/funcionarios',
      cols: ["ID","Nome","CPF","Cargo","CNH","Salário","Admissão"],
      fields: r => [r.id, r.nome, r.cpf, r.cargo, r.cnh||'—', r.salario ? 'R$ '+parseFloat(r.salario).toLocaleString('pt-BR') : '—', r.data_admissao||'—']
    };
    const PAYLOAD = () => ({ nome: v('f_nome'), cpf: v('f_cpf'), cargo: v('f_cargo'), cnh: v('f_cnh')||null, salario: parseFloat(v('f_salario'))||null, data_admissao: v('f_data_admissao')||null });

    function reloadPage() { loadTable(MODULE, 'table-funcionarios'); }

    function openModal() {
      document.getElementById('modalTitle').textContent = 'Novo — Funcionários';
      document.getElementById('modalBody').innerHTML = `
        <div class="form-grid">
          <div class="form-group"><label>Nome</label><input id="f_nome" placeholder="João Silva"/></div>
          <div class="form-group"><label>CPF</label><input id="f_cpf" placeholder="000.000.000-00"/></div>
          <div class="form-group"><label>Cargo</label><input id="f_cargo" placeholder="Operador de Máquinas"/></div>
          <div class="form-group"><label>CNH</label><input id="f_cnh" placeholder="12345678900"/></div>
          <div class="form-group"><label>Salário (R$)</label><input id="f_salario" type="number" step="0.01" placeholder="2500.00"/></div>
          <div class="form-group"><label>Data de Admissão</label><input id="f_data_admissao" type="date"/></div>
        </div>`;
      document.getElementById('modalOverlay').classList.add('open');
    }

    async function submitForm() {
      try {
        await apiFetch(MODULE.endpoint, { method: 'POST', body: JSON.stringify(PAYLOAD()) });
        toast('Salvo com sucesso!');
        closeModal();
        reloadPage();
      } catch(e) { toast('Erro: ' + e.message, true); }
    }

    function pageInit() { reloadPage(); }
    

    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('agropulse_logged')) {
        window.location.href = 'login.html';
        return;
      }
      renderLayout('funcionarios', 'Funcionários', true);
      pageInit();
    });
  </script>
</body>
</html>
